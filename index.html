<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodify - Autenticación</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="foodify.css">
    
    <!-- JS -->
    <script src="foodify.js" defer></script>
</head>
<body>

    <div class="movil">
        
        <div class="cabecera_foodify" style="margin-top: 16px;">
            FOODIFY
        </div>

        <div class="contenido_movil">
            <div class="auth-container">
                
                <div>
                    <h1 class="titulo_seccion" id="auth-title">Bienvenido</h1>
                    <p class="subtitulo_seccion" id="auth-subtitle">Ingresa tus credenciales para continuar</p>
                </div>

                <div class="auth-tabs">
                    <button class="auth-tab-btn active" id="tab-login" onclick="cambiarModo('login')">Iniciar Sesión</button>
                    <button class="auth-tab-btn" id="tab-register" onclick="cambiarModo('register')">Registrarse</button>
                </div>

                <form id="form-login" class="auth-card" onsubmit="procesarAuth(event, 'login')">
                    <div class="form-group">
                        <label for="login-email">Correo Electrónico</label>
                        <input type="email" id="login-email" class="auth-input" placeholder="ejemplo@correo.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="login-password">Contraseña</label>
                        <input type="password" id="login-password" class="auth-input" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn-submit">Entrar</button>
                </form>

                <form id="form-register" class="auth-card hidden" onsubmit="procesarAuth(event, 'register')">
                    <div class="form-group">
                        <label for="reg-name">Nombre Completo</label>
                        <input type="text" id="reg-name" class="auth-input" placeholder="Tu nombre" required>
                    </div>

                    <div class="form-group">
                        <label for="reg-email">Correo Electrónico</label>
                        <input type="email" id="reg-email" class="auth-input" placeholder="ejemplo@correo.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="reg-password">Contraseña</label>
                        <input type="password" id="reg-password" class="auth-input" placeholder="Crea una contraseña" minlength="6" required>
                    </div>

                    <button type="submit" class="btn-submit">Crear Cuenta</button>
                </form>

            </div>
        </div>

    </div>

    <script>
        function cambiarModo(modo) {
            const tabLogin = document.getElementById('tab-login');
            const tabRegister = document.getElementById('tab-register');
            const formLogin = document.getElementById('form-login');
            const formRegister = document.getElementById('form-register');
            const title = document.getElementById('auth-title');
            const subtitle = document.getElementById('auth-subtitle');

            if (modo === 'login') {
                // Activar pestaña login
                tabLogin.classList.add('active');
                tabRegister.classList.remove('active');
                // Mostrar formulario login
                formLogin.classList.remove('hidden');
                formRegister.classList.add('hidden');
                // Cambiar textos informativos
                title.textContent = "Bienvenido";
                subtitle.textContent = "Ingresa tus credenciales para continuar";
            } else {
                // Activar pestaña registro
                tabRegister.classList.add('active');
                tabLogin.classList.remove('active');
                // Mostrar formulario registro
                formRegister.classList.remove('hidden');
                formLogin.classList.add('hidden');
                // Cambiar textos informativos
                title.textContent = "Crear Cuenta";
                subtitle.textContent = "Regístrate para empezar a controlar tu nutrición";
            }
        }

        function procesarAuth(event, tipo) {
            event.preventDefault(); // Evita que la página recargue
            
            if (tipo === 'login') {
                const email = document.getElementById('login-email').value;
                console.log("Iniciando sesión con:", email);
                window.location.href = 'foodify.html';
            } else {
                const name = document.getElementById('reg-name').value;
                console.log("Registrando usuario:", name);
                cambiarModo('login'); // Te pasa automáticamente al login tras registrarte
            }
        }
    </script>
</body>
</html>
